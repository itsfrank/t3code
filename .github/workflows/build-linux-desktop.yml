name: Build Linux Desktop

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: "Optional artifact version (for example 0.0.14-fork.1)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  build_linux:
    name: Build Linux Desktop Artifact
    needs: quality
    runs-on: ubuntu-24.04
    env:
      BUILD_VERSION: ${{ github.event.inputs.build_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve build version
        shell: bash
        run: |
          version="${BUILD_VERSION:-}"
          if [[ -z "$version" ]]; then
            base_version="$(node -p "JSON.parse(require('node:fs').readFileSync('apps/server/package.json', 'utf8')).version")"
            version="${base_version}-fork.${GITHUB_RUN_NUMBER}"
          fi
          echo "BUILD_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build Linux desktop artifact
        shell: bash
        run: |
          bun run dist:desktop:artifact -- \
            --platform linux \
            --target AppImage \
            --arch x64 \
            --build-version "$BUILD_VERSION" \
            --verbose

      - name: Upload Linux desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-desktop-${{ env.BUILD_VERSION }}
          path: |
            release/*.AppImage
            release/*.blockmap
          if-no-files-found: error
