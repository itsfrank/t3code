name: Release Server Bundles

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example 1.2.3 or v1.2.3)
        required: true
        type: string
      ref:
        description: Git ref to build from (commit, branch, or tag). Defaults to the selected ref.
        required: false
        type: string

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight
    if: github.repository_owner == 'pingdotgg'
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      ref: ${{ steps.resolve_ref.outputs.ref }}
    steps:
      - id: resolve_ref
        name: Resolve build ref
        shell: bash
        run: |
          ref="${{ github.event.inputs.ref }}"
          if [[ -z "$ref" ]]; then
            ref="${{ github.sha }}"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve_ref.outputs.ref }}

      - id: release_meta
        name: Resolve release version
        shell: bash
        run: |
          raw="${{ github.event.inputs.version }}"
          version="${raw#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  build:
    name: Build ${{ matrix.label }}
    if: github.repository_owner == 'pingdotgg'
    needs: preflight
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            platform: mac
            arch: arm64
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            arch: x64
          - label: Windows x64
            runner: windows-2022
            platform: win
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Build server bundle
        run: >-
          bun run dist:server:artifact --
          --platform "${{ matrix.platform }}"
          --arch "${{ matrix.arch }}"
          --build-version "${{ needs.preflight.outputs.version }}"
          --output-dir release-publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: server-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release-publish/*.tar.gz
            release-publish/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.repository_owner == 'pingdotgg'
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Download all server artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: server-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: T3 Server v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
          fail_on_unmatched_files: true
